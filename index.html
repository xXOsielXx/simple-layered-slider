<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="styles.css">
<script src="script.js" defer></script>
</head>

<body>
<div class="slider">

  <div class="track">

    <!-- SLIDE 1 -->
    <div class="slide">
      <div class="img desktop">
        <a href=""><img src="assets/mockup-desktop-placeholder.png"></a>
      </div>
      <div class="img mobile">
        <a href=""><img src="assets/mockup-mobile-placeholder.png"></a>
      </div>
      <button class="switch">↺</button>
    </div>

    <!-- SLIDE 2 -->
    <div class="slide">
      <div class="img desktop">
        <a href=""><img src="assets/mockup-desktop-placeholder.png"></a>
      </div>
      <div class="img mobile">
        <a href=""><img src="assets/mockup-mobile-placeholder.png"></a>
      </div>
      <button class="switch">↺</button>
    </div>

  </div>

  <div class="nav prev">←</div>
  <div class="nav next">→</div>
  <div class="pagination"></div>
</div>
</body>
</html>
